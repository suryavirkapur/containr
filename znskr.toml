# znskr configuration file

[server]
host = "0.0.0.0"
port = 3000

[database]
path = "./data/znskr.db"

[proxy]
http_port = 80
https_port = 443
base_domain = "svk77.com"
load_balance = "round_robin"

[github]
client_id = ""
client_secret = ""
webhook_secret = ""

[auth]
jwt_secret = "change-me-in-production"
jwt_expiry_hours = 24

[security]
encryption_key = ""

[acme]
email = ""
certs_dir = "./data/certs"
staging = true

[storage]
data_dir = "/data/znskr"
max_volume_size_gb = 10
backup_enabled = false
rustfs_endpoint = "http://localhost:9000"
